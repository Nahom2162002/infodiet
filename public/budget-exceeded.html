<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Reached — InfoDiet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Inter, sans-serif;
            background: radial-gradient(circle at 50% 0%, #0a2e1a, #0a0f0d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
            width: 100%;
        }
        .emoji { font-size: 64px; margin-bottom: 24px; }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #00c896;
        }
        .category {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        .url {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 24px;
            word-break: break-all;
        }
        .budget-info {
            background: rgba(0,200,150,0.08);
            border: 1px solid rgba(0,200,150,0.2);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
        }
        .budget-info strong { color: #00c896; }
        .message {
            font-size: 15px;
            color: rgba(255,255,255,0.6);
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-override {
            padding: 12px 24px;
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .override-note {
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🥗</div>
        <h1>Budget Reached</h1>
        <p class="category" id="categoryText">Loading...</p>
        <p class="url" id="urlText"></p>

        <div class="budget-info" id="budgetInfo"></div>

        <p class="message">
            Your information diet is looking out for you.<br>
            You've reached your daily limit for this content category.
        </p>

        <div class="buttons">
            <button class="btn-primary" onclick="goBack()">← Go Back</button>
            <button class="btn-override" onclick="override()">Override for 10 min</button>
        </div>
        <p class="override-note">Overriding will allow access for 10 minutes before blocking again</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = decodeURIComponent(params.get('url') || '');
        const category = params.get('category') || 'other';
        const limit = params.get('limit') || '0';
        const spent = params.get('spent') || '0';

        const categoryLabels = {
            news: 'News & Politics 📰',
            social: 'Social Media 📱',
            entertainment: 'Entertainment 🎬',
            educational: 'Educational 📚',
            shopping: 'Shopping 🛍️',
            forums: 'Forums & Communities 💬',
            gaming: 'Gaming 🎮',
            other: 'Other 🌐'
        };

        document.getElementById('categoryText').textContent = categoryLabels[category] || category;
        document.getElementById('urlText').textContent = url;
        document.getElementById('budgetInfo').innerHTML =
            `You've spent <strong>${Math.round(spent)} minutes</strong> on ${categoryLabels[category] || category} today.<br>Your daily limit is <strong>${limit} minutes</strong>.`;

        function goBack() {
            history.back();
        }

        function override() {
            // Store override expiry — 10 minutes from now
            chrome.storage.local.get('overrides', (result) => {
                const overrides = result.overrides || {};
                overrides[category] = Date.now() + (10 * 60 * 1000);
                chrome.storage.local.set({ overrides }, () => {
                    window.location.href = url;
                });
            });
        }
    </script>
</body>
</html>
